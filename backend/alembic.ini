# =============================================================================
# alembic.ini — Alembic Migration Configuration
# =============================================================================
# PURPOSE: Configure Alembic, the database migration tool that tracks and
# applies schema changes to PostgreSQL/TimescaleDB.
#
# HOW MIGRATIONS WORK:
#   1. You modify a SQLAlchemy model (e.g., add a column to Building).
#   2. Run: alembic revision --autogenerate -m "add column to buildings"
#      → Alembic compares models vs. database and generates a migration script.
#   3. Run: alembic upgrade head
#      → Alembic applies all pending migrations to the database.
#
# IMPORTANT: The sqlalchemy.url below is a PLACEHOLDER. It is overridden
# by env.py at runtime, which reads the actual URL from app.config.settings.
# =============================================================================

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Migration file naming template — uses date prefix for chronological ordering
# Example: 2026-03-02_add_column_to_buildings.py
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(rev)s_%%(slug)s

# Placeholder — overridden by env.py with the real DATABASE_URL_SYNC
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
